    <script>
        xphone.onblur = () => {
            if (xphone.checked == true) {
                phone.onkeyup = () => {
                    const regex = /^[0-9]{10}$/;
                    if (regex.test(phone.value) == false) {
                        mobilevalidation.innerHTML = "invalid input";
                    }
                    else {
                        mobilevalidation.innerHTML = "";
                    }
                }
            }
            else if(xphone.checked == false){
                 phone.onkeyup = () => {
                    const regex = /^[0-9]{10}$/;
                    if (regex.test(phone.value) == false) {
                        mobilevalidation.innerHTML = "";
                    }
                }
                mobilevalidation.innerHTML="";
            }



        }
