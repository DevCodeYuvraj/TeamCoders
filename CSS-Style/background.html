<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background</title>
    <style>
        .image1 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-image: url(./images/piicture.jpg);
            background-attachment: fixed;
        }

        .image2 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-color: blue;
            background-position: center;
            background-size: cover;
        }

        .image3 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-image: url(./images/185863.jpg);
            background-attachment: fixed;
        }

        .image4 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-color: red;
            background-position: center;
            background-size: cover;
        }

        .image5 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-image: url(./images/150871.jpg);
        }

        .image6{
            width: 1600px;
            height: 300px;
            border: solid black 2px;
            background-color: yellow;
        }

        .image7 {
            width: 1600px;
            height: 300px;
            border: solid black 2px;
        }
    </style>
</head>

<body>
    <div class="image1"></div>
    <div class="image2"></div>
    <div class="image3"></div>
    <div class="image4"></div>
    <div class="image5"></div>
    <div class="image6"></div>
    <div class="image7"></div>
</body>

</html>
